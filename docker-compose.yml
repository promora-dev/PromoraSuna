version: '3.8'

services:
  backend:
    build:
      context: ./PromoraSuna/backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./PromoraSuna/backend:/app
      - browser-data:/tmp/playwright
    environment:
      - ENV_MODE=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_TO_USE=${MODEL_TO_USE:-gpt-4}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_SSL=false
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  frontend:
    build:
      context: ./PromoraSuna/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data:
  browser-data:
